<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | أبو حسين Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #05070a; }</style>
</head>
<body class="text-white p-6">

    <div class="max-w-6xl mx-auto space-y-8">
        <!-- قفل الدخول الآمن للوحة -->
        <div id="admin-auth" class="bg-slate-900/50 p-8 rounded-3xl border border-white/5 text-center max-w-md mx-auto mt-20">
            <h2 class="text-2xl font-black mb-4">لوحة تحكم السيرفر الآمنة</h2>
            <input type="password" id="admin-key" class="w-full p-4 bg-black/40 border border-emerald-500/20 rounded-xl text-center mb-4 outline-none focus:border-emerald-500" placeholder="أدخل رمز المدير السري">
            <button onclick="loadDashboard()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl hover:bg-emerald-600 transition-all">فتح اللوحة</button>
        </div>

        <!-- محتوى اللوحة الرئيسي -->
        <div id="admin-content" class="hidden space-y-8">
            <div class="flex justify-between items-center bg-slate-900/40 p-6 rounded-2xl border border-white/5">
                <h1 class="text-2xl font-black text-emerald-500">👑 لوحة التحكم المركزية للسيستم</h1>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-xs font-bold border border-red-500/10">قفل اللوحة</button>
            </div>

            <!-- شبكة الإحصائيات والأوامر السريعة -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 1. شحن رصيد العملاء -->
                <div class="bg-slate-900/30 p-6 rounded-2xl border border-white/5 space-y-4">
                    <h3 class="font-black text-lg text-emerald-400">💵 إدارة رصيد الحسابات</h3>
                    <input type="tel" id="user-phone" class="w-full p-3 bg-black/50 border border-white/5 rounded-xl text-center" placeholder="رقم هاتف العميل">
                    <input type="number" id="user-new-bal" class="w-full p-3 bg-black/50 border border-white/5 rounded-xl text-center" placeholder="الرصيد الفعلي الجديد">
                    <button onclick="updateUserBalance()" class="w-full bg-emerald-500 text-black font-black py-3 rounded-xl text-sm">تحديث الرصيد الفوري</button>
                </div>

                <!-- 2. إضافة منتج للمتجر -->
                <div class="bg-slate-900/30 p-6 rounded-2xl border border-white/5 space-y-3">
                    <h3 class="font-black text-lg text-emerald-400">📦 إضافة منتج جديد للمتجر</h3>
                    <input type="text" id="p-name" class="w-full p-2 bg-black/50 border border-white/5 rounded-xl text-xs" placeholder="اسم المنتج">
                    <input type="number" id="p-price" class="w-full p-2 bg-black/50 border border-white/5 rounded-xl text-xs" placeholder="السعر بالريال">
                    <input type="text" id="p-img" class="w-full p-2 bg-black/50 border border-white/5 rounded-xl text-xs" placeholder="رابط الصورة المباشر">
                    <input type="text" id="p-cat" class="w-full p-2 bg-black/50 border border-white/5 rounded-xl text-xs" placeholder="القسم (مثال: مواد غذائية أو باقات ورصيد)">
                    <button onclick="addProduct()" class="w-full bg-emerald-500 text-black font-black py-3 rounded-xl text-sm">تنزيل في المتجر فورا</button>
                </div>
            </div>

            <!-- عرض الفواتير والطلبات الحية للزبائن -->
            <div class="bg-slate-900/20 p-6 rounded-2xl border border-white/5">
                <h3 class="font-black text-lg mb-4 text-emerald-400">📋 الفواتير المستلمة الأخيرة في السيستم</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-right text-xs">
                        <thead>
                            <tr class="border-b border-white/5 text-slate-400">
                                <th class="p-3">رقم الفاتورة</th>
                                <th class="p-3">الهاتف</th>
                                <th class="p-3">الإجمالي</th>
                                <th class="p-3">الحالة الحالية</th>
                                <th class="p-3">التحكم بالطلب</th>
                            </tr>
                        </thead>
                        <tbody id="admin-orders-table">
                            <!-- يتم الحقن تلقائياً هنا -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let API = window.location.origin;
        let masterKey = "";

        async function loadDashboard() {
            masterKey = document.getElementById('admin-key').value;
            if(!masterKey) return alert("الرجاء إدخال المفتاح");

            try {
                let res = await fetch(`${API}/api/admin/dashboard`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ adminPass: masterKey })
                });
                let d = await res.json();
                if(res.ok) {
                    document.getElementById('admin-auth').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    renderOrders(d.data.orders);
                } else { alert("الرمز السري خطأ!"); }
            } catch(e) { alert("فشل الاتصال بالسيرفر"); }
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('admin-orders-table');
            tbody.innerHTML = orders.map(o => `
                <tr class="border-b border-white/5 hover:bg-white/5">
                    <td class="p-3 font-black text-emerald-500">${o.id}</td>
                    <td class="p-3">${o.phone}</td>
                    <td class="p-3 text-emerald-400 font-bold">${Number(o.total).toLocaleString()} YER</td>
                    <td class="p-3"><span class="bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded-md">${o.status}</span></td>
                    <td class="p-3">
                        <button onclick="updateOrderStatus('${o.id}', 'تم التوصيل')" class="bg-emerald-500 text-black px-2 py-1 rounded font-bold mr-1">توصيل</button>
                        <button onclick="updateOrderStatus('${o.id}', 'ملغي')" class="bg-red-500 text-white px-2 py-1 rounded font-bold">إلغاء</button>
                    </td>
                </tr>
            `).join('') || "<tr><td colspan='5' class='text-center p-4 opacity-40'>لا توجد طلبات بعد</td></tr>";
        }

        async function updateUserBalance() {
            const phone = document.getElementById('user-phone').value;
            const newBalance = document.getElementById('user-new-bal').value;
            if(!phone || !newBalance) return alert("أكمل البيانات");

            let res = await fetch(`${API}/api/admin/user/update-balance`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminPass: masterKey, phone, newBalance })
            });
            if(res.ok) { alert("✅ تم شحن وتحديث رصيد العميل بنجاح!"); loadDashboard(); } 
            else { alert("❌ حدث خطأ، تأكد من رقم الهاتف"); }
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const cat = document.getElementById('p-cat').value;

            let res = await fetch(`${API}/api/admin/product/add`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminPass: masterKey, name, price, img, cat })
            });
            if(res.ok) { alert("✅ تم نشر المنتج الجديد في المتجر بنجاح!"); loadDashboard(); }
        }

        async function updateOrderStatus(id, status) {
            let res = await fetch(`${API}/api/admin/order/update-status`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminPass: masterKey, id, status })
            });
            if(res.ok) { loadDashboard(); }
        }
    </script>
</body>
</html>
