<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة | تموينات أبو حسين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white p-6">
    <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
        <h1 class="text-2xl font-black text-emerald-500">لوحة إدارة الطلبات</h1>
        <div id="status-badge" class="px-4 py-1 bg-emerald-500/20 text-emerald-500 rounded-full text-xs font-bold animate-pulse">مُتصل بالسيرفر</div>
    </header>

    <!-- الطلبات -->
    <div id="admin-orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- الطلبات ستظهر هنا برمجياً -->
    </div>

    <!-- الزبائن -->
    <h2 class="text-xl font-black text-white mt-12 mb-6 border-b border-white/10 pb-4">إدارة الزبائن</h2>
    <div id="users-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- الزبائن ستظهر هنا برمجياً -->
    </div>

    <!-- صوت تنبيه الطلب الجديد -->
    <audio id="snd-alert" src="https://assets.mixkit.co/active_storage/sfx/2865/2865-preview.mp3"></audio>

    <script src="script.js"></script>

</html>
