<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تموينات أبو حسين | Smart Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white overflow-x-hidden select-none font-['Cairo']">

    <audio id="snd-cashier" src="https://assets.mixkit.co/active_storage/sfx/592/592-preview.mp3" preload="auto"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2358-preview.mp3" preload="auto"></audio>

    <!-- شاشة التمهيد -->
    <div id="splash" class="fixed inset-0 z-[8000] bg-[#05070a] flex flex-col items-center justify-center transition-all duration-1000">
        <div class="w-28 h-28 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center shadow-lg animate-pulse">
            <i class="fas fa-store text-black text-5xl"></i>
        </div>
        <h1 class="text-3xl font-black mt-8 tracking-[10px] uppercase text-emerald-500">ABU HUSSEIN</h1>
    </div>

    <!-- واجهة الدخول -->
    <section id="auth-screen" class="fixed inset-0 z-[7000] hidden flex flex-col items-center justify-center p-8 bg-[#05070a]">
        <div class="w-full max-w-sm space-y-8 animate-slideUp text-center">
            <h1 class="text-5xl font-black text-white">دخول</h1>
            <div id="login-box" class="space-y-4">
                <input type="tel" id="login-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="login-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleLogin()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg">دخول آمن</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-500 font-bold mt-6 underline">إنشاء حساب جديد</button>
            </div>
            <div id="signup-box" class="hidden space-y-4">
                <input type="text" id="reg-name" class="royal-input" placeholder="الاسم الكامل">
                <input type="tel" id="reg-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="reg-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleSignup()" class="btn-royal w-full py-5 rounded-2xl font-black">تفعيل العضوية</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-500 font-bold mt-4 underline">لديك حساب؟ سجل دخول</button>
            </div>
        </div>
    </section>

    <!-- التطبيق الرئيسي -->
    <div id="main-app" class="hidden opacity-0 transition-all duration-1000">
        <header class="fixed top-0 left-0 right-0 z-[100] px-6 py-5 bg-[#05070a]/80 backdrop-blur-2xl border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="u-avatar" class="w-12 h-12 bg-emerald-500 text-black rounded-2xl flex items-center justify-center font-black text-xl">..</div>
                <div class="text-right">
                    <span class="text-[9px] text-emerald-500 font-black uppercase leading-none">مرحباً</span>
                    <h1 id="user-display-name" class="text-lg font-black text-white">..</h1>
                </div>
            </div>
            <div id="u-balance-top" class="px-5 py-2.5 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-emerald-500 font-black text-xs">0 YER</div>
        </header>

        <main class="pt-28 p-5 pb-32 space-y-10">
            <!-- قسم الاستكشاف -->
            <div id="view-home" class="view-content space-y-8 animate-fadeIn">
                <div class="p-8 rounded-[3rem] bg-gradient-to-br from-[#0f172a] to-[#05070a] border border-white/5 relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[4px] mb-2">رصيدك الحالي</p>
                        <div class="flex items-baseline gap-2">
                            <span id="u-balance" class="text-5xl font-black text-white tracking-tighter">0</span>
                            <span class="text-sm font-bold text-emerald-500">YER</span>
                        </div>
                    </div>
                </div>
                <div id="cat-list" class="flex gap-3 overflow-x-auto no-scrollbar py-2"></div>
                <div class="grid grid-cols-2 gap-4" id="products-grid"></div>
            </div>

            <!-- قسم السلة -->
            <div id="view-cart" class="view-content hidden space-y-6">
                <h2 class="text-3xl font-black">حقيبة الطلبات</h2>
                <div id="cart-list" class="space-y-4 min-h-[40vh]"></div>
                <div class="p-8 bg-[#0a101e] rounded-[3rem] border border-white/10 space-y-6">
                    <div class="flex justify-between items-center"><span class="text-slate-400 font-bold">الإجمالي</span><span id="cart-total" class="text-3xl font-black text-emerald-400">0 YER</span></div>
                    <button onclick="processBalanceOrder()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg">دفع من الرصيد</button>
                    <button onclick="toast('تم تحويلك للواتساب')" class="w-full py-5 bg-[#25d366]/10 text-[#25d366] rounded-2xl font-black flex items-center justify-center gap-3"><i class="fab fa-whatsapp text-2xl"></i> واتساب</button>
                </div>
            </div>

            <!-- سجل الطلبات -->
            <div id="view-orders" class="view-content hidden space-y-6">
                <h2 class="text-3xl font-black">طلباتي</h2>
                <div id="orders-list" class="space-y-4"></div>
            </div>

            <!-- حسابي -->
            <div id="view-account" class="view-content hidden space-y-8">
                <div class="w-full rounded-[3.5rem] p-10 bg-[#0a101e] text-center border border-white/5">
                    <div class="w-24 h-24 bg-slate-900 border-2 border-emerald-500/20 rounded-full flex items-center justify-center mx-auto text-4xl text-emerald-500 mb-6"><i class="fas fa-user-check"></i></div>
                    <h2 id="acc-name-display" class="text-2xl font-black text-white uppercase">..</h2>
                </div>
                <button onclick="logout()" class="w-full py-5 bg-red-500/10 text-red-500 rounded-2xl font-black">تسجيل الخروج</button>
            </div>
        </main>

        <!-- بار التنقل -->
        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-[#111827]/90 backdrop-blur-3xl border border-white/5 rounded-[2.5rem] grid grid-cols-4 items-center z-[500] px-2 shadow-2xl">
            <button id="nav-home" onclick="changeView('home', this)" class="nav-item active"><i class="fas fa-house-chimney"></i><span>الرئيسية</span></button>
            <button id="nav-orders" onclick="changeView('orders', this)" class="nav-item"><i class="fas fa-receipt"></i><span>طلباتي</span></button>
            <button id="nav-cart" onclick="changeView('cart', this)" class="nav-item relative"><i class="fas fa-shopping-basket"></i><span id="cart-badge" class="absolute -top-1 right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-black hidden">0</span><span>السلة</span></button>
            <button id="nav-account" onclick="changeView('account', this)" class="nav-item"><i class="fas fa-user-circle"></i><span>حسابي</span></button>
        </nav>
    </div>

    <!-- درج المنتج -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/80 z-[1100] hidden" onclick="closeSheet()"></div>
    <div id="product-sheet" class="fixed bottom-[-100%] left-0 right-0 z-[1200] bg-[#0a101e] rounded-t-[3.5rem] p-8 transition-all duration-700 text-right">
        <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
        <img id="sh-img" class="w-full h-72 object-cover rounded-[2.5rem] mb-6">
        <h2 id="sh-name" class="text-3xl font-black text-white"></h2>
        <p id="sh-price" class="text-2xl font-black text-emerald-400 mb-6"></p>
        <button id="sh-add-btn" class="btn-royal w-full py-6 rounded-3xl text-xl font-black">إضافة للسلة</button>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[9000] bg-emerald-500 text-black px-8 py-4 hidden font-black text-sm rounded-2xl animate-slideDown"></div>

    <script src="script.js"></script>
</body>
</html>
