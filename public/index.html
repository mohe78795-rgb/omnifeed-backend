<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>أبو حسين | Groceries Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white">

    <!-- ✅ القنوات الصوتية -->
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2358-preview.mp3" preload="auto"></audio>
    <audio id="snd-cashier" src="https://assets.mixkit.co/active_storage/sfx/592/592-preview.mp3" preload="auto"></audio>

    <div class="blob"></div><div class="blob blob-2"></div>

    <!-- Splash -->
    <div id="splash" class="fixed inset-0 z-[3000] bg-[#05070a] flex items-center justify-center">
        <h1 class="text-3xl font-black text-emerald-500 animate-pulse">أبو حسين</h1>
    </div>

    <!-- Auth -->
    <section id="auth-screen" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-6 auth-bg">
        <div class="w-full max-w-sm p-10 bg-black/40 backdrop-blur-3xl rounded-[3rem] border border-white/10 text-center animate-slideUp shadow-3xl">
            <h1 class="text-3xl font-black mb-10">دخول العضوية</h1>
            <div id="login-box" class="space-y-4 animate-fadeIn">
                <input type="tel" id="login-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="login-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleLogin()" class="btn-royal w-full py-5 rounded-2xl font-black">دخول آمن</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-400 mt-4 underline font-bold">سجل حساب جديد</button>
            </div>
            <div id="signup-box" class="hidden space-y-4 animate-fadeIn">
                <input type="text" id="reg-name" class="royal-input" placeholder="الاسم الكامل">
                <input type="tel" id="reg-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="reg-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleSignup()" class="btn-royal w-full py-5 rounded-2xl font-black text-black">تفعيل الآن</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-400 mt-4 underline font-bold">لديك حساب؟ دخول</button>
            </div>
        </div>
    </section>

    <!-- Main App -->
    <div id="main-app" class="hidden opacity-0 transition-all duration-1000">
        <header class="fixed top-0 left-0 right-0 z-[1000] px-6 py-6 bg-black/60 backdrop-blur-xl border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-3"><div id="u-avatar" class="w-10 h-10 bg-emerald-500 text-black rounded-xl flex items-center justify-center font-black">..</div><h1 class="font-black text-lg">أبو حسين</h1></div>
            <div class="flex items-center gap-2">
                <button class="w-10 h-10 bg-white/5 rounded-xl border border-white/5 flex items-center justify-center" onclick="switchLayout()"><i id="layoutIcon" class="fa fa-table-cells text-emerald-500"></i></button>
                <div id="u-balance-top" class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-500 font-black text-[11px]">0 YER</div>
            </div>
        </header>

        <main class="pt-28 p-5 pb-44 space-y-10">
            <!-- Home -->
            <div id="view-home" class="view-content space-y-10 animate-fadeIn">
                <div class="relative p-3 rounded-[2.5rem] bg-[#0a101e]/60 backdrop-blur-md border border-white/5 overflow-hidden shadow-2xl">
                    <video id="promo-video" autoplay loop playsinline class="w-full h-48 object-cover rounded-2xl"></video>
                    <button onclick="toggleMute()" class="absolute bottom-6 left-6 w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 z-10">
                        <i id="mute-icon" class="fas fa-volume-mute text-white text-[11px]"></i>
                    </button>
                </div>
                <div class="search-bar"><i class="fa fa-search text-emerald-500/50"></i><input type="text" oninput="searchCategories()" placeholder="ابحث عن قسم..."></div>
                <div id="categories-grid" class="cards-container mode-matrix"></div>
            </div>

            <!-- Category Sub-View -->
            <div id="view-category-details" class="view-content hidden space-y-8 animate-fadeIn">
                <div class="flex items-center gap-4"><button onclick="changeView('home')" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center border border-white/5"><i class="fa fa-arrow-right text-white"></i></button><h2 id="current-cat-name" class="text-2xl font-black text-white">..</h2></div>
                <div id="category-products-grid" class="cards-container mode-dual"></div>
            </div>

            <!-- Cart View -->
            <div id="view-cart" class="view-content hidden space-y-8 animate-fadeIn">
                <h2 class="text-3xl font-black text-white">حقيبة المشتريات</h2>
                <div id="cart-list" class="space-y-3"></div>
                <div class="p-8 bg-[#0a101e] rounded-[3rem] border border-white/5 text-center shadow-3xl">
                    <span id="cart-total" class="text-3xl font-black text-emerald-400 block mb-6">0 YER</span>
                    <button onclick="processBalanceOrder()" class="btn-royal w-full py-5 rounded-2xl font-black text-black">تأكيد المشتريات من الرصيد</button>
                </div>
            </div>

            <!-- Orders -->
            <div id="view-orders" class="view-content hidden space-y-8 animate-fadeIn"><h2 class="text-3xl font-black text-white px-2">فواتيري</h2><div id="orders-list"></div></div>

            <!-- Account -->
            <div id="view-account" class="view-content hidden space-y-8 animate-fadeIn text-center pt-10">
                <div class="p-10 bg-[#0a101e] rounded-[3rem] border border-white/5 shadow-2xl">
                    <div class="w-24 h-24 bg-slate-900 rounded-full mx-auto flex items-center justify-center text-4xl text-emerald-500 mb-6 border border-white/5"><i class="fas fa-user-shield"></i></div>
                    <h2 id="acc-name-display" class="text-2xl font-black text-white">..</h2>
                    <p id="acc-phone-display" class="text-emerald-500 mb-8 font-bold tracking-widest">..</p>
                    <button onclick="logout()" class="text-red-500 font-bold active:scale-90 transition-all"><i class="fas fa-power-off"></i> تسجيل الخروج</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 bg-black/80 backdrop-blur-2xl border-t border-white/5 grid grid-cols-5 items-center z-[500] px-4 shadow-3xl">
            <button onclick="changeView('home', this)" class="nav-item active"><i class="fas fa-home"></i><span>استكشاف</span></button>
            <button onclick="toast('قريباً')" class="nav-item"><i class="fas fa-bolt-lightning"></i><span>عروض</span></button>
            <button id="cart-fab" onclick="changeView('cart', null)" class="btn-fab-royal transition-all duration-300"><i class="fas fa-shopping-bag"></i></button>
            <button onclick="changeView('orders', this)" class="nav-item"><i class="fas fa-receipt"></i><span>فواتيري</span></button>
            <button onclick="changeView('account', this)" class="nav-item"><i class="fas fa-user-gear"></i><span>حسابي</span></button>
        </nav>
    </div>

    <!-- Product Sheet -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/95 z-[1500] hidden" onclick="closeSheet()"></div>
    <div id="product-sheet" class="fixed bottom-[-100%] left-0 right-0 z-[1600] bg-[#05070a] border-t border-emerald-500/20 rounded-t-[3rem] p-10 transition-all duration-700">
        <img id="sh-img" class="w-full h-64 object-cover rounded-[2.5rem] mb-6 shadow-2xl border border-white/5">
        <h2 id="sh-name" class="text-2xl font-black text-white mb-2"></h2>
        <p id="sh-price" class="text-3xl font-black text-emerald-400 mb-8"></p>
        <button id="sh-add-btn" class="btn-royal w-full py-6 rounded-full text-xl font-black text-black">إضافة للسلة +</button>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[7000] bg-emerald-500 text-black px-8 py-3 hidden font-black text-xs rounded-full shadow-2xl animate-slideDown"></div>

    <script src="script.js"></script>
</body>
</html>
