<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تموينات أبو حسين | Smart Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white overflow-x-hidden select-none">

    <!-- أصوات النظام -->
    <audio id="snd-cashier" src="https://assets.mixkit.co/active_storage/sfx/592/592-preview.mp3" preload="auto"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2358-preview.mp3" preload="auto"></audio>

    <!-- إشعار علوي ذكي -->
    <div id="top-push-notif" class="fixed top-[-150px] left-4 right-4 z-[6000] bg-[#1a1c25]/95 backdrop-blur-xl border border-white/10 p-5 rounded-[2rem] shadow-2xl flex items-center gap-4 transition-all duration-500">
        <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center text-white"><i class="fas fa-bell"></i></div>
        <div class="flex-1 text-right">
            <h4 class="text-emerald-500 font-black text-[10px] uppercase tracking-widest leading-none mb-1">تحديث النظام</h4>
            <p id="notif-text" class="text-sm font-bold text-white">تمت العملية بنجاح!</p>
        </div>
    </div>

    <!-- شاشة التمهيد -->
    <div id="splash" class="fixed inset-0 z-[7000] bg-[#05070a] flex flex-col items-center justify-center transition-all duration-700">
        <div class="relative w-24 h-24 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center shadow-2xl animate-bounce">
            <i class="fas fa-store text-white text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black mt-6 tracking-[8px] uppercase">أبو حسين</h1>
    </div>

    <!-- نافذة الموقع -->
    <div id="location-modal" class="fixed inset-0 z-[5500] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="w-full max-w-sm bg-[#0a101e] rounded-[3rem] p-10 border border-white/10 text-center space-y-6 animate-slideUp">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto text-emerald-500 text-4xl animate-pulse"><i class="fas fa-location-dot"></i></div>
            <h3 class="text-2xl font-black">موقع التوصيل</h3>
            <p class="text-slate-400 text-sm leading-relaxed">لضمان وصول الطلب بدقة، يرجى السماح بمشاركة موقعك الجغرافي عبر واتساب.</p>
            <div class="grid gap-3 pt-4">
                <button onclick="triggerGPSProcess()" class="btn-royal py-4 rounded-2xl font-black text-lg">موافق، إرسال موقعي</button>
                <button onclick="closeLocationModal()" class="w-full py-3 text-slate-500 font-bold uppercase">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="main-app" class="hidden opacity-0 transition-all duration-1000">
        
        <header class="fixed top-0 inset-x-0 z-[100] px-6 py-6 bg-[#05070a]/90 backdrop-blur-xl border-b border-white/5 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div id="u-avatar" class="w-11 h-11 bg-emerald-500 text-black rounded-xl flex items-center justify-center font-black text-lg">..</div>
                <div class="text-right">
                    <p class="text-[8px] text-emerald-500 font-black tracking-widest uppercase leading-none mb-1">تموينات</p>
                    <h1 class="text-lg font-black text-white leading-none">أبو حسين</h1>
                </div>
            </div>
            <div id="u-balance-top" class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-500 font-black text-[10px] shadow-inner">0 YER</div>
        </header>

        <main class="pt-28 p-5 pb-32 space-y-10">
            <!-- الواجهة الرئيسية -->
            <div id="view-home" class="view-content space-y-8 animate-fadeIn">
                <!-- كرت المحفظة -->
                <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-[#0a101e] to-[#05070a] border border-emerald-500/10 shadow-3xl relative overflow-hidden">
                    <canvas id="gold-particles" class="absolute inset-0 z-0"></canvas>
                    <div class="relative z-10">
                        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[5px] mb-2">الرصيد المتوفر</p>
                        <div class="flex items-baseline gap-2">
                            <span id="u-balance" class="text-4xl font-black text-white tracking-tighter">0</span>
                            <span class="text-xs font-bold text-emerald-500">YER</span>
                        </div>
                    </div>
                </div>

                <!-- البحث -->
                <div class="relative">
                    <input type="text" id="home-search" oninput="searchInHome()" placeholder="ابحث عما تريد.." class="w-full py-4 px-6 pr-12 bg-white/5 border border-white/5 rounded-2xl outline-none focus:border-emerald-500/50 text-sm font-bold text-right text-white">
                    <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-slate-500"></i>
                </div>

                <!-- التصنيفات -->
                <div id="cat-list" class="flex gap-3 overflow-x-auto no-scrollbar py-1"></div>

                <!-- المنتجات -->
                <div class="grid grid-cols-2 gap-4" id="products-grid"></div>
            </div>

            <!-- السلة -->
            <div id="view-cart" class="view-content hidden space-y-8 animate-fadeIn">
                <h2 class="text-3xl font-black px-2 tracking-tighter">حقيبة المشتريات</h2>
                <div id="cart-list" class="space-y-4 min-h-[200px]"></div>
                <div class="p-8 bg-[#0a101e] rounded-[3rem] border border-white/5 space-y-6 shadow-3xl">
                    <div class="flex justify-between items-center text-lg"><span class="text-slate-400 font-bold uppercase text-xs">المجموع النهائي</span><span id="cart-total" class="text-3xl font-black text-emerald-400 tracking-tighter">0 YER</span></div>
                    <div class="grid gap-3">
                        <button onclick="processBalanceOrder()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg shadow-xl">تأكيد المشتريات</button>
                        <button onclick="openLocationModal()" class="w-full py-5 bg-[#25d366]/10 text-[#25d366] border border-[#25d366]/20 rounded-2xl font-black flex items-center justify-center gap-3"><i class="fab fa-whatsapp text-2xl"></i> طلب عبر واتساب</button>
                    </div>
                </div>
            </div>

            <!-- طلباتي -->
            <div id="view-orders" class="view-content hidden space-y-8 animate-fadeIn">
                <h2 class="text-3xl font-black px-2 tracking-tighter">سجل العمليات</h2>
                <div id="orders-list" class="space-y-6"></div>
            </div>

            <!-- حسابي -->
            <div id="view-account" class="view-content hidden space-y-8 animate-fadeIn">
                <div class="text-center py-10 bg-gradient-to-b from-white/5 to-transparent rounded-[3rem] border border-white/5">
                    <div class="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl text-emerald-500 border-2 border-emerald-500/20 shadow-2xl"><i class="fas fa-user-shield"></i></div>
                    <h2 id="acc-name-display" class="text-xl font-black">..</h2>
                    <p id="acc-phone-display" class="text-slate-500 text-sm font-bold mt-1 tracking-widest">..</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button class="luxury-card" onclick="changeView('orders')"><i class="fas fa-history text-emerald-500"></i><span>طلباتي</span></button>
                    <button class="luxury-card" onclick="toast('قريباً')"><i class="fas fa-wallet text-blue-500"></i><span>شحن رصيد</span></button>
                    <button class="luxury-card" onclick="toast('قريباً')"><i class="fas fa-cog text-slate-500"></i><span>الإعدادات</span></button>
                    <button id="logout-btn" onclick="logout()" class="luxury-card text-red-500 border-red-500/10"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button>
                </div>
            </div>
        </main>

        <!-- بار التنقل -->
        <nav class="fixed bottom-0 inset-x-0 h-24 bg-[#0a0d14]/95 backdrop-blur-2xl border-t border-white/5 grid grid-cols-4 items-center px-4 z-[500]">
            <button onclick="changeView('home', this)" class="nav-item active"><i class="fas fa-house-chimney text-lg"></i><span>الرئيسية</span></button>
            <button onclick="changeView('orders', this)" class="nav-item"><i class="fas fa-receipt text-lg"></i><span>طلباتي</span></button>
            <button onclick="changeView('cart', this)" class="nav-item relative">
                <i class="fas fa-shopping-bag text-lg"></i>
                <span>السلة</span>
                <span id="cart-badge" class="absolute top-2 right-1/2 translate-x-4 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-black hidden">0</span>
            </button>
            <button onclick="changeView('account', this)" class="nav-item"><i class="fas fa-user-circle text-lg"></i><span>حسابي</span></button>
        </nav>
    </div>

    <!-- درج المنتج -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/95 z-[1100] hidden" onclick="closeSheet()"></div>
    <div id="product-sheet" class="fixed bottom-[-100%] inset-x-0 z-[1200] bg-[#05070a] border-t border-white/10 rounded-t-[4rem] p-10 transition-all duration-700 text-right">
        <div class="w-16 h-1 bg-white/10 rounded-full mx-auto mb-8"></div>
        <img id="sh-img" class="w-full h-64 object-cover rounded-[2.5rem] mb-8 shadow-2xl">
        <h2 id="sh-name" class="text-3xl font-black mb-2"></h2>
        <p id="sh-price" class="text-2xl font-black text-emerald-400 mb-8"></p>
        <button id="sh-add-btn" class="btn-royal w-full py-5 rounded-2xl text-lg font-black shadow-xl">إضافة للسلة +</button>
    </div>

    <div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 z-[8000] bg-emerald-500 text-black px-8 py-3 rounded-full font-black text-xs hidden shadow-2xl animate-slideUp"></div>

    <script src="script.js"></script>
</body>
</html>
