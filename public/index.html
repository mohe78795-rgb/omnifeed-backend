<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تموينات أبو حسين | Smart Prestige</title>
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- الملف الخارجي للتنسيق -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white overflow-x-hidden select-none font-['Cairo']">

    <!-- أصوات النظام -->
    <audio id="snd-cashier" src="https://assets.mixkit.co/active_storage/sfx/592/592-preview.mp3" preload="auto"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2358-preview.mp3" preload="auto"></audio>

    <!-- شاشة التمهيد (Splash Screen) -->
    <div id="splash" class="fixed inset-0 z-[8000] bg-[#05070a] flex flex-col items-center justify-center transition-all duration-1000">
        <div class="relative w-28 h-28 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center shadow-[0_0_50px_rgba(16,185,129,0.3)] animate-pulse">
            <i class="fas fa-store text-black text-5xl"></i>
        </div>
        <h1 class="text-3xl font-black mt-8 tracking-[10px] uppercase text-emerald-500">ABU HUSSEIN</h1>
        <div class="mt-4 flex gap-1">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
        </div>
    </div>

    <!-- واجهة الدخول والتسجيل (Auth) -->
    <section id="auth-screen" class="fixed inset-0 z-[7000] hidden flex flex-col items-center justify-center p-8 bg-[#05070a]">
        <div class="w-full max-w-sm space-y-8 animate-slideUp text-center">
            <div class="mb-10">
                <h1 class="text-5xl font-black mb-2 text-white">دخول</h1>
                <p class="text-emerald-500 font-bold text-[10px] uppercase tracking-[5px]">Premium Market Access</p>
            </div>
            
            <!-- صندوق تسجيل الدخول -->
            <div id="login-box" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone absolute right-5 top-1/2 -translate-y-1/2 text-emerald-500/50"></i>
                    <input type="tel" id="login-phone" class="royal-input pr-12" placeholder="رقم الهاتف">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute right-5 top-1/2 -translate-y-1/2 text-emerald-500/50"></i>
                    <input type="password" id="login-pass" class="royal-input pr-12" placeholder="كلمة المرور">
                </div>
                <button onclick="handleLogin()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg shadow-xl mt-4">دخول آمن</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-500 font-bold mt-6 uppercase tracking-widest underline">إنشاء حساب جديد</button>
            </div>

            <!-- صندوق إنشاء الحساب -->
            <div id="signup-box" class="hidden space-y-4">
                <input type="text" id="reg-name" class="royal-input" placeholder="الاسم الكامل">
                <input type="tel" id="reg-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="reg-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleSignup()" class="btn-royal w-full py-5 rounded-2xl font-black shadow-xl">تفعيل العضوية</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-500 font-bold mt-4 underline">لديك حساب؟ سجل دخول</button>
            </div>
        </div>
    </section>

    <!-- التطبيق الرئيسي (Main App) -->
    <div id="main-app" class="hidden opacity-0 transition-all duration-1000">
        
        <!-- الهيدر العلوي -->
        <header class="fixed top-0 left-0 right-0 z-[100] px-6 py-5 bg-[#05070a]/80 backdrop-blur-2xl border-b border-white/5 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div id="u-avatar" class="w-12 h-12 bg-gradient-to-br from-emerald-400 to-emerald-600 text-black rounded-2xl flex items-center justify-center font-black text-xl shadow-lg shadow-emerald-500/20">..</div>
                <div class="flex flex-col text-right">
                    <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest leading-none mb-1">مرحباً بك</span>
                    <h1 id="user-display-name" class="text-lg font-black text-white leading-none">..</h1>
                </div>
            </div>
            <div id="u-balance-top" class="px-5 py-2.5 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-emerald-500 font-black text-xs shadow-inner">0 YER</div>
        </header>

        <main class="pt-28 p-5 pb-44 space-y-12">
            
            <!-- واجهة الاستكشاف (الرئيسية) -->
            <div id="view-home" class="view-content space-y-8 animate-fadeIn">
                <!-- كرت المحفظة الملكي -->
                <div id="wallet-card" class="p-8 rounded-[3rem] bg-gradient-to-br from-[#0f172a] to-[#05070a] border border-white/5 shadow-3xl relative overflow-hidden group">
                    <canvas id="gold-particles" class="absolute inset-0 z-0"></canvas>
                    <div class="relative z-10 text-right">
                        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[4px] mb-2">رصيدك الحالي</p>
                        <div class="flex items-baseline gap-2">
                            <span id="u-balance" class="text-5xl font-black text-white tracking-tighter">0</span>
                            <span class="text-sm font-bold text-emerald-500">YER</span>
                        </div>
                    </div>
                </div>

                <!-- شريط البحث -->
                <div class="relative group">
                    <input type="text" id="home-search" oninput="searchInHome()" placeholder="عن ماذا تبحث اليوم؟" class="w-full py-5 px-6 pr-14 bg-white/5 border border-white/5 rounded-[2rem] outline-none focus:border-emerald-500/30 transition-all text-sm font-bold text-right text-white shadow-inner">
                    <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-500 transition-colors"></i>
                </div>

                <!-- التصنيفات -->
                <div id="cat-list" class="flex gap-3 overflow-x-auto no-scrollbar py-2"></div>

                <!-- شبكة المنتجات -->
                <div class="grid grid-cols-2 gap-4" id="products-grid"></div>
            </div>

            <!-- واجهة السلة (Shopping Cart) -->
            <div id="view-cart" class="view-content hidden space-y-8 animate-fadeIn">
                <h2 class="text-3xl font-black px-2 tracking-tighter">حقيبة الطلبات</h2>
                <div id="cart-list" class="space-y-4 min-h-[40vh]"></div>
                <div class="p-8 bg-[#0a101e] rounded-[3rem] border border-white/10 space-y-6 shadow-3xl">
                    <div class="flex justify-between items-center px-2">
                        <span class="text-slate-400 font-bold text-xs uppercase">المجموع</span>
                        <span id="cart-total" class="text-3xl font-black text-emerald-400">0 YER</span>
                    </div>
                    <div class="grid gap-3">
                        <button onclick="processBalanceOrder()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg shadow-xl">دفع من الرصيد آمن</button>
                        <button onclick="toast('جاري فتح واتساب...')" class="w-full py-5 bg-[#25d366]/10 text-[#25d366] border border-[#25d366]/20 rounded-2xl font-black flex items-center justify-center gap-3">
                            <i class="fab fa-whatsapp text-2xl"></i> طلب عبر واتساب
                        </button>
                    </div>
                </div>
            </div>

            <!-- واجهة طلباتي (Order History) -->
            <div id="view-orders" class="view-content hidden space-y-8 animate-fadeIn">
                <h2 class="text-3xl font-black px-2 tracking-tighter text-white">سجل العمليات</h2>
                <div id="orders-list" class="space-y-4"></div>
            </div>

            <!-- واجهة حسابي (Dashboard) -->
            <div id="view-account" class="view-content hidden space-y-8 animate-fadeIn">
                <div class="relative w-full rounded-[3.5rem] p-10 bg-[#0a101e] text-center border border-white/5 shadow-2xl">
                    <div class="w-24 h-24 bg-slate-900 border-2 border-emerald-500/20 rounded-full flex items-center justify-center mx-auto text-4xl text-emerald-500 mb-6 shadow-inner">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h2 id="acc-name-display" class="text-2xl font-black text-white uppercase tracking-tighter">..</h2>
                    <p id="acc-phone-display" class="text-emerald-500 font-bold text-sm tracking-widest mt-1 opacity-70">..</p>
                </div>

                <div class="grid grid-cols-2 gap-3 px-2">
                    <button class="luxury-card" onclick="toast('قريباً: شحن الرصيد')">
                        <i class="fas fa-wallet"></i>
                        <span>شحن رصيد</span>
                    </button>
                    <button class="luxury-card" onclick="changeView('orders', document.getElementById('nav-orders'))">
                        <i class="fas fa-history"></i>
                        <span>طلباتي</span>
                    </button>
                    <button class="luxury-card" onclick="toast('الإصدار 30.0 V')">
                        <i class="fas fa-info-circle"></i>
                        <span>عن المتجر</span>
                    </button>
                    <button class="luxury-card !text-red-500" onclick="logout()">
                        <i class="fas fa-power-off"></i>
                        <span>خروج</span>
                    </button>
                </div>

                <div class="px-4">
                    <a href="tel:967737528057" class="w-full py-5 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-center gap-3 font-bold">
                        <i class="fas fa-phone-volume text-blue-500"></i>
                        اتصال مباشر بالمحل
                    </a>
                </div>
            </div>
        </main>

        <!-- بار التنقل السفلي (Navbar) -->
        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-[#111827]/90 backdrop-blur-3xl border border-white/5 rounded-[2.5rem] grid grid-cols-4 items-center z-[500] px-2 shadow-2xl">
            <button id="nav-home" onclick="changeView('home', this)" class="nav-item active"><i class="fas fa-house-chimney"></i><span>الرئيسية</span></button>
            <button id="nav-orders" onclick="changeView('orders', this)" class="nav-item"><i class="fas fa-receipt"></i><span>طلباتي</span></button>
            <button id="nav-cart" onclick="changeView('cart', this)" class="nav-item relative">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-badge" class="absolute -top-1 right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-black border-4 border-[#111827] hidden">0</span>
                <span>السلة</span>
            </button>
            <button id="nav-account" onclick="changeView('account', this)" class="nav-item"><i class="fas fa-user-circle"></i><span>حسابي</span></button>
        </nav>
    </div>

    <!-- درج تفاصيل المنتج (Drawer) -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[1100] hidden" onclick="closeSheet()"></div>
    <div id="product-sheet" class="fixed bottom-[-100%] left-0 right-0 z-[1200] bg-[#0a101e] border-t border-white/10 rounded-t-[3.5rem] p-8 transition-all duration-700 shadow-3xl text-right">
        <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
        <img id="sh-img" class="w-full h-72 object-cover rounded-[2.5rem] mb-6 shadow-2xl">
        <div class="flex justify-between items-start mb-10 px-2">
            <div>
                <h2 id="sh-name" class="text-3xl font-black text-white tracking-tight"></h2>
                <span class="text-emerald-500 text-[10px] font-black uppercase mt-1 block tracking-widest">توصيل فوري ⚡</span>
            </div>
            <div class="text-left">
                <span id="sh-price" class="text-3xl font-black text-emerald-400"></span>
                <p class="text-[10px] text-slate-500 font-bold uppercase">YER</p>
            </div>
        </div>
        <button id="sh-add-btn" class="btn-royal w-full py-6 rounded-3xl text-xl font-black shadow-xl">إضافة للسلة +</button>
    </div>

    <!-- توست الإشعارات (Toast) -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[9000] bg-emerald-500 text-black px-8 py-4 hidden font-black text-sm rounded-2xl shadow-2xl animate-slideDown"></div>

    <!-- ربط ملفات الجافاسكربت -->
    <script src="script.js"></script>
</body>
</html>
