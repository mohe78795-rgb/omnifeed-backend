<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>أبو حسين | Smart Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-white select-none">

    <!-- شاشة التمهيد -->
    <div id="splash" class="fixed inset-0 z-[3000] bg-[#05070a] flex items-center justify-center transition-all duration-700">
        <div class="w-20 h-20 bg-emerald-500 rounded-[2rem] flex items-center justify-center animate-bounce shadow-2xl shadow-emerald-500/20">
            <i class="fas fa-store text-black text-3xl"></i>
        </div>
    </div>

    <!-- واجهة الدخول الفخمة (Auth) -->
    <section id="auth-screen" class="fixed inset-0 z-[1500] hidden flex items-center justify-center p-6 bg-[#05070a]">
        <div class="w-full max-w-sm p-10 space-y-8 text-center bg-gradient-to-br from-[#0a101e] to-[#0d1527] rounded-[3rem] border border-white/5 shadow-3xl animate-slideUp">
            <div class="space-y-2">
                <h1 class="text-4xl font-black tracking-tighter">أبو حسين</h1>
                <p class="text-emerald-500 text-[10px] font-black uppercase tracking-[4px]">Sovereign Market</p>
            </div>

            <!-- صندوق تسجيل الدخول -->
            <div id="login-box" class="space-y-4 animate-fadeIn">
                <input type="tel" id="login-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="login-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleLogin()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg">دخول للمتجر</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-500 mt-4 font-bold">ليس لديك حساب؟ <span class="text-emerald-500 underline">سجل الآن</span></button>
            </div>

            <!-- صندوق إنشاء الحساب (الجديد) -->
            <div id="signup-box" class="hidden space-y-4 animate-fadeIn">
                <input type="text" id="reg-name" class="royal-input" placeholder="الاسم الكامل">
                <input type="tel" id="reg-phone" class="royal-input" placeholder="رقم الهاتف">
                <input type="password" id="reg-pass" class="royal-input" placeholder="كلمة المرور">
                <button onclick="handleSignup()" class="btn-royal w-full py-5 rounded-2xl font-black text-lg">تفعيل الحساب</button>
                <button onclick="toggleAuth()" class="w-full text-xs text-slate-500 mt-4 font-bold">لديك حساب بالفعل؟ <span class="text-emerald-500 underline">دخول</span></button>
            </div>
        </div>
    </section>

    <!-- التطبيق الرئيسي -->
    <div id="main-app" class="hidden opacity-0 transition-all duration-1000">
        <header class="fixed top-0 left-0 right-0 z-[100] px-6 py-6 bg-[#05070a]/90 backdrop-blur-xl border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="u-avatar" class="w-10 h-10 bg-emerald-500 text-black rounded-xl flex items-center justify-center font-black">..</div>
                <h1 class="font-black text-lg">أبو حسين</h1>
            </div>
            <div id="u-balance-top" class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-500 font-black text-[11px] shadow-glow">0 YER</div>
        </header>

        <main class="pt-28 p-5 pb-44 space-y-10">
            <!-- الشاشة الرئيسية -->
            <div id="view-home" class="view-content space-y-10 animate-fadeIn">
                
                <!-- فيديو الإعلان مع زر كتم الصوت -->
                <div class="relative p-3 rounded-[2.5rem] bg-[#0a101e] border border-white/5 overflow-hidden shadow-2xl">
                    <video id="promo-video" src="" autoplay loop playsinline class="w-full h-48 object-cover rounded-2xl"></video>
                    <button onclick="toggleMute()" id="mute-btn" class="absolute bottom-6 left-6 w-10 h-10 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                        <i id="mute-icon" class="fas fa-volume-mute text-white text-xs"></i>
                    </button>
                </div>

                <!-- البحث (تعديل اللون الزمردي) -->
                <div class="relative px-1">
                    <input type="text" id="home-search" oninput="searchInHome()" placeholder="ابحث عما تريد.." class="w-full py-4 px-6 pr-12 bg-white/5 border border-emerald-500/10 rounded-2xl outline-none focus:border-emerald-500/40 transition-all text-sm text-right text-white shadow-inner">
                    <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-emerald-500/40"></i>
                </div>

                <div id="cat-list" class="flex gap-2 overflow-x-auto no-scrollbar py-1"></div>
                <div class="grid grid-cols-2 gap-4" id="products-grid"></div>
            </div>

            <!-- السلة -->
            <div id="view-cart" class="view-content hidden space-y-8">
                <h2 class="text-3xl font-black">الحقيبة</h2>
                <div id="cart-list" class="space-y-4"></div>
                <div class="p-8 bg-[#0a101e] rounded-[3rem] border border-white/5 text-center shadow-3xl">
                    <span id="cart-total" class="text-3xl font-black text-emerald-400 block mb-6 tracking-tighter">0 YER</span>
                    <button onclick="processBalanceOrder()" class="btn-royal w-full py-5 rounded-2xl font-black">تأكيد المشتريات من الرصيد</button>
                </div>
            </div>

            <!-- سجل الطلبات -->
            <div id="view-orders" class="view-content hidden space-y-8">
                <h2 class="text-3xl font-black px-2">فواتيري</h2>
                <div id="orders-list" class="space-y-4"></div>
            </div>

            <!-- الحساب -->
            <div id="view-account" class="view-content hidden space-y-8 text-center pt-10">
                <div class="p-10 bg-[#0a101e] rounded-[3.5rem] border border-white/5 shadow-2xl">
                    <div class="w-24 h-24 bg-slate-900 rounded-full mx-auto flex items-center justify-center text-4xl text-emerald-500 mb-6 border border-emerald-500/20"><i class="fas fa-user-shield"></i></div>
                    <h2 id="acc-name-display" class="text-2xl font-black">..</h2>
                    <p id="acc-phone-display" class="text-emerald-500 mb-10 tracking-widest">..</p>
                    <button onclick="logout()" class="luxury-btn-red"><i class="fas fa-power-off"></i> تسجيل الخروج</button>
                </div>
            </div>
        </main>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-0 left-0 right-0 h-24 bg-[#0a0d14]/95 backdrop-blur-2xl border-t border-white/5 grid grid-cols-5 items-center z-[500] px-4">
            <button onclick="changeView('home', this)" class="nav-item active"><i class="fas fa-compass"></i><span>استكشاف</span></button>
            <button onclick="toast('قريباً')" class="nav-item"><i class="fas fa-bolt-lightning"></i><span>عروض</span></button>
            <button onclick="changeView('cart', null)" class="btn-fab-royal"><i class="fas fa-shopping-bag"></i></button>
            <button id="nav-orders" onclick="changeView('orders', this)" class="nav-item"><i class="fas fa-receipt"></i><span>طلباتي</span></button>
            <button onclick="changeView('account', this)" class="nav-item"><i class="fas fa-user-gear"></i><span>حسابي</span></button>
        </nav>
    </div>

    <!-- Modal -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/95 z-[1100] hidden" onclick="closeSheet()"></div>
    <div id="product-sheet" class="fixed bottom-[-100%] left-0 right-0 z-[1200] bg-[#05070a] border-t border-white/10 rounded-t-[3rem] p-10 transition-all duration-700 text-right">
        <div class="w-12 h-1 bg-white/10 mx-auto mb-8 rounded-full"></div>
        <img id="sh-img" class="w-full h-64 object-cover rounded-[2.5rem] mb-6 shadow-2xl">
        <h2 id="sh-name" class="text-2xl font-black mb-2"></h2>
        <p id="sh-price" class="text-3xl font-black text-emerald-400 mb-8 tracking-tighter"></p>
        <button id="sh-add-btn" class="btn-royal w-full py-6 rounded-2xl text-xl font-black">إضافة للسلة +</button>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[7000] bg-emerald-500 text-black px-8 py-3 hidden font-black text-xs rounded-full shadow-2xl"></div>

    <audio id="snd-cashier" src="https://assets.mixkit.co/active_storage/sfx/592/592-preview.mp3"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2358-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
