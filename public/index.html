<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تموينات أبو حسين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white overflow-x-hidden select-none">

    <!-- [1] واجهة الدخول وإنشاء الحساب -->
    <section id="auth-screen" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center p-6">
        <div class="auth-bg absolute inset-0 z-[-1]"></div>
        
        <div id="login-box" class="w-full max-w-sm text-center animate-fadeIn">
            <i class="fas fa-store text-7xl text-emerald-500 mb-6"></i>
            <h1 class="text-3xl font-black mb-10">تموينات <span class="text-emerald-500">أبو حسين</span></h1>
            <div class="space-y-4">
                <input type="tel" id="login-phone" class="glass-input" placeholder="رقم الهاتف">
                <input type="password" id="login-pass" class="glass-input" placeholder="كلمة المرور">
                <button onclick="handleLogin()" class="btn-gold w-full p-4 rounded-2xl font-black">تسجيل الدخول</button>
                <p class="text-sm mt-4 text-white/40">ليس لديك حساب؟ <span onclick="toggleAuth()" class="text-emerald-400 font-bold cursor-pointer">إنشاء حساب جديد</span></p>
            </div>
        </div>

        <div id="signup-box" class="w-full max-w-sm text-center hidden animate-fadeIn">
            <h2 class="text-2xl font-black mb-8 text-emerald-500">إنشاء حساب جديد</h2>
            <div class="space-y-4">
                <input type="text" id="reg-name" class="glass-input" placeholder="الاسم الكامل">
                <input type="tel" id="reg-phone" class="glass-input" placeholder="رقم الهاتف">
                <input type="password" id="reg-pass" class="glass-input" placeholder="كلمة المرور">
                <button onclick="handleSignup()" class="btn-gold w-full p-4 rounded-2xl font-black">إنشاء الحساب ودخول</button>
                <p class="text-sm mt-4 text-white/40">لديك حساب بالفعل؟ <span onclick="toggleAuth()" class="text-emerald-400 font-bold cursor-pointer">تسجيل دخول</span></p>
            </div>
        </div>
    </section>

    <!-- [2] واجهة المتجر الرئيسية -->
    <div id="main-app" class="hidden opacity-0 transition-opacity duration-700">
        <header class="p-6 sticky top-0 z-[100] backdrop-blur-lg bg-[#020617]/80 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <div id="u-avatar" class="w-12 h-12 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-emerald-400 font-black text-xl">..</div>
                <div>
                    <p id="greeting" class="text-[9px] text-white/40 font-bold uppercase"></p>
                    <h2 id="u-name" class="font-black text-lg text-white">جاري التحميل..</h2>
                </div>
            </div>
        </header>

        <main class="p-6 space-y-8 pb-32">
            
            <!-- صفحة المتجر -->
            <div id="view-home" class="view-content space-y-8">
                <!-- بنر إعلاني علوي -->
                <div class="w-full h-40 rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl">
                    <img src="https://i.postimg.cc/g2b3dzzB/IMG-20260608-053600.png" class="w-full h-full object-cover" alt="Banner">
                </div>

                <div class="glass-card p-8 bg-gradient-to-br from-emerald-900/40 to-transparent rounded-[2.5rem] border border-white/5">
                    <p class="text-[10px] font-black text-emerald-400/60 uppercase mb-1">الرصيد المتاح</p>
                    <div class="flex items-baseline gap-2">
                        <span id="u-balance" class="text-5xl font-[1000] tracking-tighter">0</span>
                        <span class="text-xs font-black text-emerald-500 uppercase">Yer</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="relative">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/20"></i>
                        <input type="text" id="search-input" oninput="filterProducts()" placeholder="ابحث عن منتج.." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-xs outline-none focus:border-emerald-500/50">
                    </div>
                    <div id="cat-list" class="flex gap-3 overflow-x-auto no-scrollbar py-2"></div>
                </div>
                <div id="products-grid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- صفحة العروض (بديلة للمباشر) -->
            <div id="view-offers" class="view-content hidden space-y-6">
                <h2 class="text-2xl font-black text-emerald-500 italic">أقوى العروض 🔥</h2>
                
                <!-- فيديو MP4 -->
                <div class="w-full rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl bg-black">
                    <video controls class="w-full aspect-video" poster="https://i.postimg.cc/g2b3dzzB/IMG-20260608-053600.png">
                        <source src="your_video_link.mp4" type="video/mp4">
                        متصفحك لا يدعم تشغيل الفيديو.
                    </video>
                </div>

                <!-- صور عروض PNG -->
                <div class="grid grid-cols-1 gap-4">
                    <img src="https://i.postimg.cc/XXzCdgwL/In-Shot-20260609-223828162.png" class="w-full rounded-[2rem] border border-white/10" alt="Offer 1">
                    <img src="https://i.postimg.cc/g2b3dzzB/IMG-20260608-053600.png" class="w-full rounded-[2rem] border border-white/10" alt="Offer 2">
                </div>
            </div>

            <!-- صفحة السلة -->
            <div id="view-cart" class="view-content hidden space-y-6">
                <h2 class="text-2xl font-black">سلة المشتريات</h2>
                <div id="cart-list" class="space-y-4 min-h-[200px]"></div>
                <div class="glass-card p-6 border border-white/10 space-y-4">
                    <div class="flex justify-between font-black"><span>الإجمالي:</span><span id="cart-total" class="text-emerald-400">0</span></div>
                    <button onclick="confirmOrder()" class="btn-gold w-full py-4 rounded-2xl font-black">تأكيد الطلب</button>
                </div>
            </div>

            <!-- صفحة حسابي -->
            <div id="view-account" class="view-content hidden space-y-6 text-center">
                <div class="w-24 h-24 bg-white/5 rounded-full mx-auto flex items-center justify-center border border-white/10">
                    <i class="fas fa-user text-4xl text-emerald-500"></i>
                </div>
                <h2 id="acc-name" class="text-xl font-black text-white">جاري التحميل..</h2>
                <p id="acc-phone" class="text-sm text-white/40 tracking-widest"></p>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="glass-card p-4">
                        <p class="text-[10px] opacity-40 uppercase font-bold">الرصيد</p>
                        <p id="acc-bal" class="font-black text-emerald-400">0</p>
                    </div>
                    <div class="glass-card p-4">
                        <p class="text-[10px] opacity-40 uppercase font-bold">الحالة</p>
                        <p class="font-black text-emerald-400">نشط</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-black border border-red-500/20 mt-10">تسجيل الخروج</button>
            </div>
        </main>

        <nav class="fixed bottom-6 left-6 right-6 h-18 bg-[#0f172a]/95 backdrop-blur-2xl border border-white/10 rounded-[2.2rem] flex justify-around items-center z-[500] px-4 shadow-2xl">
            <button onclick="changeView('home', this)" class="nav-btn active">
                <i class="fas fa-home"></i><span class="text-[7px] font-black mt-1 uppercase">الرئيسية</span>
            </button>
            <button onclick="changeView('cart', this)" class="nav-btn relative">
                <i class="fas fa-shopping-bag"></i><span id="cart-badge" class="absolute top-2 right-4 bg-emerald-500 text-black text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-black hidden">0</span>
                <span class="text-[7px] font-black mt-1 uppercase">السلة</span>
            </button>
            <button onclick="changeView('offers', this)" class="nav-btn">
                <i class="fas fa-tags"></i><span class="text-[7px] font-black mt-1 uppercase">العروض</span>
            </button>
            <button onclick="changeView('account', this)" class="nav-btn">
                <i class="fas fa-user-circle"></i><span class="text-[7px] font-black mt-1 uppercase">حسابي</span>
            </button>
        </nav>
    </div>

    <div id="sheet-overlay" class="fixed inset-0 bg-black/90 z-[1100] hidden backdrop-blur-sm" onclick="closeSheet()"></div>
    <div id="product-sheet" class="fixed bottom-[-100%] left-0 right-0 z-[1200] bg-[#051510] border-t border-emerald-500/20 rounded-t-[3rem] p-10 transition-all duration-500">
        <div class="w-16 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
        <img id="sh-img" class="w-full h-64 object-cover rounded-[2.5rem] mb-6 shadow-2xl border border-white/5">
        <h2 id="sh-name" class="text-3xl font-black mb-2 text-white"></h2>
        <div class="flex justify-between items-center mb-8">
            <span id="sh-price" class="text-3xl font-black text-emerald-400"></span>
            <span class="text-xs font-black text-emerald-500 bg-emerald-500/10 px-4 py-2 rounded-xl">متوفر</span>
        </div>
        <button id="sh-add-btn" class="btn-gold w-full py-5 text-lg font-black rounded-2xl">إضافة للسلة</button>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[2000] bg-emerald-950/90 border border-emerald-500/30 px-8 py-4 hidden text-emerald-400 font-black text-xs rounded-2xl shadow-2xl"></div>

    <script src="script.js"></script>
</body>
</html>
