<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تموينات أبو حسين | Smart Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-slideUp { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-royal {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-royal:active { transform: scale(0.95); opacity: 0.9; }
        .nav-item { transition: all 0.3s; opacity: 0.5; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { opacity: 1; color: #10b981; }
        .luxury-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .view-content { transition: opacity 0.4s ease; }
    </style>
</head>
<body class="bg-[#05070a] text-white overflow-x-hidden select-none">

    <!-- إشعار علوي -->
    <div id="top-push-notif" class="fixed top-[-150px] left-4 right-4 z-[6000] bg-[#1a1c25]/95 backdrop-blur-xl border border-white/10 p-5 rounded-[2rem] shadow-2xl flex items-center gap-4 transition-all duration-500">
        <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center text-white"><i class="fas fa-bell"></i></div>
        <div class="flex-1 text-right">
            <h4 class="text-emerald-500 font-black text-[10px] uppercase tracking-widest">إشعار</h4>
            <p id="notif-text" class="text-sm font-bold">تم تحديث سلة مشترياتك</p>
        </div>
    </div>

    <!-- شاشة التمهيد (Splash) -->
    <div id="splash" class="fixed inset-0 z-[7000] bg-[#05070a] flex flex-col items-center justify-center transition-all duration-700">
        <div class="relative w-20 h-20 bg-emerald-500 rounded-[2rem] flex items-center justify-center shadow-2xl animate-bounce">
            <i class="fas fa-store text-white text-3xl"></i>
        </div>
        <h1 class="text-2xl font-black mt-6 tracking-[5px]">أبو حسين</h1>
        <div class="mt-4 flex gap-1">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping [animation-delay:0.2s]"></div>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping [animation-delay:0.4s]"></div>
        </div>
    </div>

    <!-- نافذة الموقع -->
    <div id="location-modal" class="fixed inset-0 z-[5500] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="w-full max-w-sm bg-[#0a101e] rounded-[3rem] p-10 border border-white/10 text-center space-y-6">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto text-emerald-500 text-4xl"><i class="fas fa-location-dot"></i></div>
            <h3 class="text-2xl font-black">موقع التوصيل</h3>
            <p class="text-slate-400 text-sm">يجب السماح بالوصول للموقع لإرساله عبر الواتساب لتسهيل عملية التوصيل.</p>
            <button onclick="triggerGPSProcess()" class="btn-royal w-full py-4 rounded-2xl font-black">موافق، إرسال موقعي</button>
            <button onclick="closeLocationModal()" class="text-slate-500 font-bold">إلغاء</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="main-app" class="hidden">
        <header class="fixed top-0 inset-x-0 z-[100] p-6 bg-[#05070a]/80 backdrop-blur-lg border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center font-black">أ</div>
                <div class="text-right">
                    <p class="text-[8px] text-emerald-500 font-black tracking-widest uppercase">تطبيق</p>
                    <h1 class="text-lg font-black leading-none">أبو حسين</h1>
                </div>
            </div>
            <div class="px-4 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-500 font-black text-xs">
                <span id="u-balance">2500</span> YER
            </div>
        </header>

        <main class="pt-28 p-5 pb-32">
            <!-- قسم الاستكشاف -->
            <div id="view-home" class="view-content space-y-8">
                <div class="relative">
                    <input type="text" placeholder="ابحث عن منتج..." class="w-full py-4 px-6 pr-12 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-emerald-500 text-right">
                    <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                </div>

                <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
                    <button class="px-6 py-2 bg-emerald-500 text-black rounded-full font-bold text-sm whitespace-nowrap">الكل</button>
                    <button class="px-6 py-2 bg-white/5 rounded-full font-bold text-sm whitespace-nowrap">أجبان</button>
                    <button class="px-6 py-2 bg-white/5 rounded-full font-bold text-sm whitespace-nowrap">مشروبات</button>
                    <button class="px-6 py-2 bg-white/5 rounded-full font-bold text-sm whitespace-nowrap">معلبات</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- مثال لمنتج -->
                    <div class="bg-[#0a101e] border border-white/5 p-3 rounded-[2rem] space-y-3">
                        <img src="https://images.unsplash.com/photo-1559181567-c3190ca9959b?w=400" class="w-full aspect-square object-cover rounded-2xl">
                        <div>
                            <h3 class="font-bold text-sm">عصير راني حبيبات</h3>
                            <p class="text-emerald-500 font-black">500 YER</p>
                        </div>
                        <button onclick="toast('تم الإضافة للسلة')" class="w-full py-2 bg-white/5 hover:bg-emerald-500 rounded-xl transition-colors"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="bg-[#0a101e] border border-white/5 p-3 rounded-[2rem] space-y-3">
                        <img src="https://images.unsplash.com/photo-1622484210800-2086438063b8?w=400" class="w-full aspect-square object-cover rounded-2xl">
                        <div>
                            <h3 class="font-bold text-sm">حليب نيدو 400 جرام</h3>
                            <p class="text-emerald-500 font-black">3500 YER</p>
                        </div>
                        <button onclick="toast('تم الإضافة للسلة')" class="w-full py-2 bg-white/5 hover:bg-emerald-500 rounded-xl transition-colors"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <!-- قسم الحساب -->
            <div id="view-account" class="view-content hidden space-y-6">
                <div class="text-center py-10 bg-gradient-to-b from-white/5 to-transparent rounded-[3rem]">
                    <div class="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl text-emerald-500 border-2 border-emerald-500/20"><i class="fas fa-user"></i></div>
                    <h2 class="text-xl font-black">عميلنا العزيز</h2>
                    <p class="text-slate-500 text-sm">737528057</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="luxury-card"><i class="fas fa-history text-emerald-500"></i><span>الطلبات</span></div>
                    <div class="luxury-card"><i class="fas fa-wallet text-blue-500"></i><span>المحفظة</span></div>
                    <div class="luxury-card"><i class="fas fa-headset text-orange-500"></i><span>الدعم</span></div>
                    <div id="logout-btn" onclick="location.reload()" class="luxury-card text-red-500"><i class="fas fa-sign-out-alt"></i><span>خروج</span></div>
                </div>
            </div>
        </main>

        <!-- بار التنقل السفلي -->
        <nav class="fixed bottom-0 inset-x-0 h-20 bg-[#0a0d14]/90 backdrop-blur-2xl border-t border-white/5 grid grid-cols-4 items-center px-4">
            <button onclick="changeView('home', this)" class="nav-item active"><i class="fas fa-home text-lg mb-1"></i><span>الرئيسية</span></button>
            <button onclick="changeView('offers', this)" class="nav-item"><i class="fas fa-tag text-lg mb-1"></i><span>العروض</span></button>
            <button onclick="changeView('cart', this)" class="nav-item relative">
                <i class="fas fa-shopping-cart text-lg mb-1"></i>
                <span>السلة</span>
                <span class="absolute top-0 right-1/2 translate-x-4 bg-red-500 text-[8px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </button>
            <button onclick="changeView('account', this)" class="nav-item"><i class="fas fa-user text-lg mb-1"></i><span>حسابي</span></button>
        </nav>
    </div>

    <!-- توست إشعار صغير -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[8000] bg-emerald-500 text-black px-6 py-3 rounded-full font-bold text-xs hidden shadow-2xl"></div>

    <script>
        // إخفاء الـ Splash Screen بعد ثانيتين
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            }, 700);
        }, 2500);

        // وظيفة تغيير الواجهات
        function changeView(viewId, btn) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        // وظائف الموقع
        function openLocationModal() { document.getElementById('location-modal').classList.remove('hidden'); }
        function closeLocationModal() { document.getElementById('location-modal').classList.add('hidden'); }
        
        function triggerGPSProcess() {
            toast("جاري تحديد الموقع...");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    const url = `https://wa.me/967737528057?text=موقعي: https://www.google.com/maps?q=${latitude},${longitude}`;
                    window.open(url, '_blank');
                    closeLocationModal();
                }, () => {
                    toast("فشل تحديد الموقع. يرجى تفعيل الـ GPS");
                });
            }
        }

        // إشعار التوست
        function toast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
            
            // إظهار الإشعار العلوي كمثال
            const push = document.getElementById('top-push-notif');
            document.getElementById('notif-text').innerText = msg;
            push.style.top = '20px';
            setTimeout(() => push.style.top = '-150px', 3000);
        }
    </script>
</body>
</html>
